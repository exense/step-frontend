@if (item().value; as value) {
  <span class="auto-shrink-item-text">{{ value }}</span>
} @else {
  @if (emptyValue()?.templateRef; as templateRef) {
    <ng-container *ngTemplateOutlet="templateRef" />
  }
}
@if (itemAction()?.templateRef; as templateRef) {
  <ng-container *ngTemplateOutlet="templateRef; context: { $implicit: item() }" />
}
