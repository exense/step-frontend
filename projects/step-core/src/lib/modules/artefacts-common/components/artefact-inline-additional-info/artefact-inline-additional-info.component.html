@if (hasData()) {
  <section class="etc-container">
    @if (showAttachmentPreview()) {
      <step-legacy-attachments-preview [attachments]="attachmentMetas()" />
    } @else {
      <step-attachment-inline-preview-list [attachmentMetas]="attachmentMetas()" />
    }
    @if (description(); as description) {
      <div class="description-container">
        <step-icon name="align-left" matTooltip="Description" />
        <div class="description-text">
          {{ description }}
        </div>
      </div>
    }
    @if (error(); as error) {
      <div class="error-container">
        <step-icon name="alert-triangle" matTooltip="Error" />
        <div class="error-text" stepClampFade [lines]="5">
          {{ error }}
        </div>
      </div>
    }
  </section>
}
