<mat-card>
  <mat-card-header>
    <mat-card-title>
      <span>...</span>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <section>
      @for (item of items(); track item.id) {
        <button type="button" mat-stroked-button (click)="openView.emit(item.id)">
          @if (item.miniatureTemplateRef; as miniatureTemplateRef) {
            <ng-container *ngTemplateOutlet="miniatureTemplateRef" />
          } @else {
            {{ item | viewItemDefaultName }}
          }
        </button>
      }
    </section>
  </mat-card-content>
</mat-card>
