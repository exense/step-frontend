<mat-card>
  <mat-card-header>
    <mat-card-title>
      <span>...</span>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <section>
      @for (item of items(); track item.key) {
        <button type="button" mat-stroked-button (click)="openView.emit(item.key)">
          {{ item.value | uppercase }}
        </button>
      }
    </section>
  </mat-card-content>
</mat-card>
