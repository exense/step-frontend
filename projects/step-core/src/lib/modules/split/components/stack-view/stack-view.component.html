<step-stack-view-breadcrumbs [views]="views()" (openView)="openView($event)" />
<button type="button" mat-button mat-raised-button (click)="closeAll.emit()">Close All</button>
<step-split>
  @for (view of viewsAndGroups(); track view.id; let isLast = $last; let isFirst = $first) {
    @if (view | isSplitViewGroup; as group) {
      <step-split-area sizeType="pixel" [size]="GROUP_WIDTH">
        <step-view-group [group]="group" (openView)="openView($event)" />
      </step-split-area>
    } @else {
      <step-split-area sizeType="flex">
        <step-view-item
          [view]="view"
          [canMinimize]="isMaximized() && isLast && !isFirst"
          [canMaximize]="!isMaximized() && isLast && !isFirst"
          (remove)="removeView(view.id)"
          (maximize)="maximize()"
          (minimize)="minimize()"
        />
      </step-split-area>
    }
    @if (!isLast) {
      <step-split-gutter />
    }
  }
</step-split>
