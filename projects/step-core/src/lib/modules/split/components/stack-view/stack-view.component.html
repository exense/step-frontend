<step-split [class.with-overflow]="withOverflow()">
  @for (view of viewsAndGroups(); track view.id; let isLast = $last; let isFirst = $first) {
    @if (view | isSplitViewGroup; as group) {
      <step-split-area sizeType="pixel" [size]="GROUP_WIDTH" [isFixedInput]="true">
        <step-view-group
          [group]="group"
          (openView)="openView($event)"
          [viewGroupTooltip]="viewGroupTooltip()?._templateRef"
        />
      </step-split-area>
    } @else {
      <step-split-area sizeType="flex">
        <step-view-item
          [view]="view"
          [canClose]="canClosePanels() && (!isFirst || isLast)"
          [closeTooltip]="isFirst ? rootCloseTooltip() : 'Close panel'"
          [canMinimize]="isMaximized() && isLast && !isFirst"
          [canMaximize]="!isMaximized() && isLast && !isFirst"
          [isLast]="isLast"
          (remove)="removeView(view.id)"
          (maximize)="maximize()"
          (minimize)="minimize()"
        />
      </step-split-area>
    }
    @if (!isLast) {
      <step-split-gutter />
    }
  }
</step-split>
