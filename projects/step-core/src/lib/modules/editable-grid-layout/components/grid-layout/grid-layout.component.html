@if (_gridEditable.editMode()) {
  <step-grid-background />
}
@if (isInitialised()) {
  @for (item of gridItems(); track item.widgetId) {
    @if (item.templateRef; as templateRef) {
      <step-grid-element [elementId]="item.widgetId">
        <ng-container *ngTemplateOutlet="templateRef" />
        <step-grid-drag-handle />
        <step-grid-resizer />
      </step-grid-element>
    } @else {
      <step-grid-element [elementId]="item.widgetId" class="hidden-placeholder">
        <step-grid-drag-handle />
        <step-grid-element-title />
        <step-grid-resizer />
      </step-grid-element>
    }
  }
}
<div #preview class="preview" [class.preview-invalid]="invalidPreview()"></div>
