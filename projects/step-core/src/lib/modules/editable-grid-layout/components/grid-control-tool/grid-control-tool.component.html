<step-form-field>
  <mat-select
    [ngModel]="selectedPresetId()"
    (ngModelChange)="handlePresetSelection($event)"
    [disabled]="isEdit()"
    id="layout-selector"
    matTooltip="Switch layout"
    matTooltipPosition="below"
  >
    @for (preset of presets(); track preset.key) {
      <mat-option [value]="preset.key">{{ preset.value }}</mat-option>
    }
  </mat-select>
  @if (isEdit()) {
    @if (!isProtected()) {
      <step-suffix class="button-suffix">
        <step-popover yPosition="below" [mode]="PopoverMode.CLICK" [whiteBackground]="true" [smallFont]="false" [withBorder]="true">
          <button
            type="button"
            mat-stroked-button
            matTooltip="Configure layout"
            matTooltipPosition="below"
          >
            <step-icon name="tool" />
          </button>
          <step-popover-content>
            <div class="preset-config-popover">
              <div class="preset-config-popover__title">Configure "{{ presetName() }}"</div>
              <mat-slide-toggle
                [checked]="popoverIsShared()"
                (change)="popoverIsShared.set($event.checked)"
                color="primary"
              >Shared</mat-slide-toggle>
              <p class="preset-config-popover__description">If selected, the layout will be displayed to all users</p>
              <div class="preset-config-popover__actions">
                <button
                  type="button"
                  mat-flat-button
                  color="primary"
                  [disabled]="!configHasChanges()"
                  (click)="savePresetConfig()"
                >Save</button>
                <button
                  type="button"
                  mat-flat-button
                  color="warn"
                  (click)="remove()"
                >Delete</button>
              </div>
            </div>
          </step-popover-content>
        </step-popover>
      </step-suffix>
    }
    <step-suffix class="button-suffix">
      <button
        type="button"
        mat-stroked-button
        (click)="toggleEditMode()"
        matTooltip="Cancel edit mode and reset all unsaved changes."
        matTooltipPosition="below"
      >
        <step-icon name="x" />
      </button>
    </step-suffix>
    <step-suffix class="button-suffix">
      <button
        type="button"
        mat-flat-button
        (click)="save()"
        color="primary"
        matTooltip="Save layout changes"
        matTooltipPosition="below"
      >
        <step-icon name="save" />
      </button>
    </step-suffix>
  } @else {
    <step-suffix class="button-suffix">
      <button
        type="button"
        mat-stroked-button
        (click)="toggleEditMode()"
        matTooltip="Edit grid"
        matTooltipPosition="below"
      >
        <step-icon name="settings" />
      </button>
    </step-suffix>
  }
</step-form-field>
