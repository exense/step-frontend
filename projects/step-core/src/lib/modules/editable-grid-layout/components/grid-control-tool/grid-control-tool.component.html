<step-form-field>
  <mat-select
    [ngModel]="selectedPresetId()"
    (ngModelChange)="handlePresetSelection($event)"
    [disabled]="isEdit()"
    [matTooltip]="hintSwitchLayout()"
    matTooltipPosition="below"
  >
    @for (preset of presets(); track preset.key) {
      <mat-option [value]="preset.key">{{ preset.value }}</mat-option>
    }
  </mat-select>
  @if (isEdit()) {
    <step-suffix class="button-suffix">
      <button
        type="button"
        mat-stroked-button
        (click)="toggleEditMode()"
        [matTooltip]="hintCancelResetPreset()"
        matTooltipPosition="below"
      >
        <step-icon name="x" />
      </button>
    </step-suffix>
    <step-suffix class="button-suffix">
      <button
        type="button"
        mat-flat-button
        (click)="save()"
        color="primary"
        [matTooltip]="hintSave()"
        matTooltipPosition="below"
      >
        <step-icon name="save" />
      </button>
    </step-suffix>
  } @else {
    @if (!isProtected()) {
      <step-suffix class="button-suffix">
        <button
          type="button"
          mat-stroked-button
          [matTooltip]="hintPresetSettings()"
          matTooltipPosition="below"
          [matMenuTriggerFor]="presetSettings"
        >
          <step-icon name="settings" />
        </button>
      </step-suffix>
    }
    <step-suffix class="button-suffix">
      <button
        type="button"
        mat-stroked-button
        (click)="toggleEditMode()"
        [matTooltip]="hintEditGrid()"
        matTooltipPosition="below"
      >
        <step-icon name="grid" />
      </button>
    </step-suffix>
  }
</step-form-field>
<mat-menu #presetSettings>
  @if (isShared()) {
    <button type="button" mat-menu-item (click)="unshare()">
      <step-icon name="lock" />
      Unshare
    </button>
  } @else {
    <button type="button" mat-menu-item (click)="share()">
      <step-icon name="share-2" />
      Share
    </button>
  }
  <button type="button" mat-menu-item (click)="remove()">
    <step-icon name="trash-2" />
    Delete
  </button>
</mat-menu>
