@if (!isEdit()) {
  <step-btn-group class="with-round-borders">
    <button type="button" mat-stroked-button matTooltip="Edit grid" matTooltipPosition="below" (click)="startEdit()">
      <step-icon name="grid" />
    </button>
  </step-btn-group>
} @else {
  <step-btn-group class="with-round-borders">
    <step-popover
      [mode]="PopoverMode.CLICK"
      [whiteBackground]="true"
      [noPadding]="true"
      #gridSettingsPopover
      xPosition="before"
      yPosition="above"
    >
      <button type="button" class="active" mat-stroked-button matTooltip="Edit grid" matTooltipPosition="below">
        <step-icon name="grid" />
      </button>
      <step-popover-content>
        <mat-card>
          <mat-card-header>
            <mat-card-title>Grid settings</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <section class="settings">
              <step-form-field class="preset">
                <step-label>Preset:</step-label>
                <mat-select [ngModel]="selectedPresetId()" (ngModelChange)="handlePresetSelection($event)">
                  @for(preset of presets(); track preset.key){
                    <mat-option [value]="preset.key">{{preset.value}}</mat-option>
                  }
                </mat-select>
                <step-suffix class="button-suffix">
                  <button type="button" mat-stroked-button (click)="removePreset()" [disabled]="isProtected()">
                    <step-icon name="trash-2"/>
                  </button>
                </step-suffix>
              </step-form-field>
            </section>
          </mat-card-content>
          <mat-card-actions align="end">
            <button type="button" mat-button (click)="reset()">Reset</button>
            &nbsp;
            <button type="button" mat-flat-button color="primary" (click)="save()" [disabled]="isProtected()">Save</button>
            &nbsp;
            <button type="button" mat-flat-button color="primary" (click)="saveAsNew()">Save As New</button>
          </mat-card-actions>
        </mat-card>
      </step-popover-content>
    </step-popover>
  </step-btn-group>
}
