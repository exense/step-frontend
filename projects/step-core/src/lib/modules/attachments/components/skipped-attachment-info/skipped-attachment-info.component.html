<div class="skipped-attachment-info">
  @if (skippedReason()) {
    <p>{{ skippedReason() }}</p>
  } @else {
    <p>The Step controller limits the number of attachments per execution to prevent performance bottlenecks.</p>
  }
  <a [href]="documentationUrl()" target="_blank" rel="noopener noreferrer">Learn more</a>
</div>
