<section class="header">
  <step-btn-group>
    <step-autorefresh-toggle stepTestId="agent-auto-refresh" [interval]="5000" (refresh)="loadTable()">
    </step-autorefresh-toggle>
  </step-btn-group>
</section>
<step-table
  [dataSource]="searchableAgent"
  matSort
  [matSortDisableClear]="true"
  [indicatorMode]="TableIndicatorMode.SKELETON_ON_INITIAL_LOAD"
>
  <ng-container matColumnDef="url" stepSearchCol>
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Url</th>
    <td mat-cell *matCellDef="let element">
      {{ element.agentRef!.agentUrl! }}
    </td>
  </ng-container>
  <ng-container matColumnDef="type" stepSearchCol>
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
    <td mat-cell *matCellDef="let element">
      <step-token-type [type]="element.agentRef!.agentType"></step-token-type>
    </td>
  </ng-container>
  <ng-container matColumnDef="capacity">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Token states</th>
    <td mat-cell *matCellDef="let element">
      <step-token-state-progressbar [tokenGroup]="element.tokensCapacity"></step-token-state-progressbar>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let element" class="cell-actions">
      <step-btn-group [stepEntityRef]="element">
        <button
          stepTestId="pause-agent-btn"
          mat-icon-button
          matTooltip="Pause agent and enter maintenance mode"
          [disabled]="!!busyActionByAgentId()[element.agentRef!.agentId] || !('token-manage' | hasRight | async)"
          [attr.aria-busy]="busyActionByAgentId()[element.agentRef!.agentId] === 'INTERRUPT'"
          (click)="interrupt(element.agentRef!.agentId)"
        >
          @if (busyActionByAgentId()[element.agentRef!.agentId] === 'INTERRUPT') {
            <step-button-spinner label="Pausing agent" />
          } @else {
            <step-icon name="pause" />
          }
        </button>
        <button
          stepTestId="resume-agent-btn"
          mat-icon-button
          matTooltip="Resume agent and exit maintenance mode"
          [disabled]="!!busyActionByAgentId()[element.agentRef!.agentId] || !('token-manage' | hasRight | async)"
          [attr.aria-busy]="busyActionByAgentId()[element.agentRef!.agentId] === 'RESUME'"
          (click)="resume(element.agentRef!.agentId)"
        >
          @if (busyActionByAgentId()[element.agentRef!.agentId] === 'RESUME') {
            <step-button-spinner label="Resuming agent" />
          } @else {
            <step-icon name="play" />
          }
        </button>
        <button
          stepTestId="remove-errors-btn"
          mat-icon-button
          matTooltip="Remove all token errors"
          [disabled]="!!busyActionByAgentId()[element.agentRef!.agentId] || !('token-manage' | hasRight | async)"
          [attr.aria-busy]="busyActionByAgentId()[element.agentRef!.agentId] === 'REMOVE_ERRORS'"
          (click)="removeTokenErrors(element.agentRef!.agentId)"
        >
          @if (busyActionByAgentId()[element.agentRef!.agentId] === 'REMOVE_ERRORS') {
            <step-button-spinner label="Removing token errors" />
          } @else {
            <step-icon name="check" />
          }
        </button>
      </step-btn-group>
    </td>
  </ng-container>
</step-table>
