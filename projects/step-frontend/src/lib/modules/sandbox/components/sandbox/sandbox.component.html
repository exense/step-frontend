<section>
  <step-stack-view (removeItem)="removeItem($event)">
    @for (item of items(); track item.id) {
      <step-stack-view-item [itemId]="item.id" [itemTitle]="item.title">
        <strong *stepStackViewItemTitle>{{ item.title }}</strong>
        <div class="item" *stepStackViewItemContent>
          <span>Content for view with id</span>
          <strong>{{ item.id }}</strong>
        </div>
      </step-stack-view-item>
    }
  </step-stack-view>
  <div>
    <button type="button" mat-button mat-flat-button color="primary" (click)="addItem()">Add</button>
  </div>
</section>
