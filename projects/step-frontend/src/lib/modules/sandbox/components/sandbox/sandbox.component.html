<section>
  <step-stack-view (removeItem)="removeItem($event)">
    @for (item of items(); track item.id) {
      <div class="item" *stepStackViewItem="item.id; title: item.title">
        <span>Content for view with id</span>
        <strong>{{ item.id }}</strong>
      </div>
    }
  </step-stack-view>
  <div>
    <button type="button" mat-button mat-flat-button color="primary" (click)="addItem()">Add</button>
  </div>
</section>
