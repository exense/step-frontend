<div class="container">
  <div class="previous-executions-container" [style.--style__nodeSize.px]="nodesSize()">
    <!--    eslint-disable-next-line step-lint/track-is-item-field-->
    @for (node of paddedPastExecutions(); track $index) {

      @if (node) {
        <step-popover>
          <div class="history-item-container" [class.arrow]="$last">
            <div
              class="simple-node connect-line link"
              [style.width.px]="nodesSize()"
              [style.height.px]="nodesSize()"
              [style.background-color]="node.color"
            ></div>
          </div>
          <step-popover-content>
            <div>
              <step-execution-history-node-tooltip [node]="node"/>
            </div>
          </step-popover-content>
        </step-popover>

      } @else {
        <div class="history-item-container" [class.arrow]="$last">
          <div class="empty-node connect-line" [style.width.px]="nodesSize()" [style.height.px]="nodesSize()"></div>
        </div>
      }
    }
  </div>

  <step-popover>
    <div
      class="simple-node link"
      [style.width.px]="currentNodeSize()"
      [style.height.px]="currentNodeSize()"
      [style.background-color]="currentNode().color"
    ></div>
    <step-popover-content>
      <div>
        <step-execution-history-node-tooltip [node]="currentNode()"/>
      </div>
    </step-popover-content>
  </step-popover>
</div>
