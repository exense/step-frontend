<step-modal-window title="Execution notices">
  <div step-modal-window-body>
    <step-table class="compact-rows" [dataSource]="dataSource" matSort [matSortDisableClear]="true">
      <ng-container matColumnDef="severity" stepSearchCol>
        <step-array-filter *stepSearchCellDef [items]="severityItems" stepFilterConnect />
        <th mat-header-cell mat-sort-header *matHeaderCellDef>Severity</th>
        <td mat-cell *matCellDef="let element" class="severity-cell">
          <step-icon
            [name]="severityIcon(element.severity)"
            [ngClass]="'severity-' + (element.severity | lowercase)"
            aria-hidden="true"
          />
          <span>{{ element.severity }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="category" stepSearchCol>
        <step-input-filter *stepSearchCellDef stepFilterConnect />
        <th mat-header-cell mat-sort-header *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let element">{{ element.category }}</td>
      </ng-container>
      <ng-container matColumnDef="message" stepSearchCol>
        <step-input-filter *stepSearchCellDef stepFilterConnect />
        <th mat-header-cell *matHeaderCellDef>Message</th>
        <td mat-cell *matCellDef="let element">
          <span class="notice-message" [innerHTML]="element.message | safeHtml"></span>
        </td>
      </ng-container>
      <ng-container matColumnDef="timestamp">
        <th mat-header-cell mat-sort-header *matHeaderCellDef>First occurrence</th>
        <td mat-cell *matCellDef="let element">{{ element.timestamp | date: DateFormat.DATE }}</td>
      </ng-container>
    </step-table>
  </div>
  <div step-modal-window-buttons>
    <button type="button" mat-button mat-dialog-close>Close</button>
  </div>
</step-modal-window>
