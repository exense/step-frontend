@if (aggregatedNode(); as aggregatedNode) {
  <div class="iteration-list">
    <step-aggregated-tree-node-iteration-list
      [node]="aggregatedNode"
      [resolvedPartialPath]="panel().resolvedPartialPath"
      [initialStatus]="panel().searchStatus"
      [initialStatusCount]="panel().searchStatusCount"
      (showDetails)="handleOpenDetails($event)"
    />
  </div>

  @if (aggregatedNode.artefactHash; as artefactHash) {
    <step-execution-history-section [artefactHashContainer]="{ artefactHash }" />
  }
}
