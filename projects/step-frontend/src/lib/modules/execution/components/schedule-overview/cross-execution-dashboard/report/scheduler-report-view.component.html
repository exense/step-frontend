@if (hasNoLayout()) {
  <div class="no-layout-message">
    <h3>Configure a layout to see the Cross Execution Report</h3>
  </div>
}
<step-grid-layout [class.hidden]="hasNoLayout()">
  <step-summary-card
    *stepGridItem="'successRate'; autoHeightOnFirstRow: true"
    [value]="_state.successRateValue$ | async"
    [inProgress]="_state.timeSeriesInProgress()"
  />
  <step-summary-card
    *stepGridItem="'averageExecutionDuration'; autoHeightOnFirstRow: true"
    [value]="_state.averageExecutionDurationLabel$ | async"
    [inProgress]="_state.timeSeriesInProgress()"
  />
  <step-summary-card
    *stepGridItem="'totalExecutions'; autoHeightOnFirstRow: true"
    [value]="_state.totalExecutionsCount$ | async"
    [inProgress]="_state.timeSeriesInProgress()"
  />
  <step-alt-report-node-summary
    *stepGridItem="'summaryExecutions'"
    [summary]="_state.summaryData$ | async"
    [disableChartItemClick]="true"
    [inProgress]="_state.timeSeriesInProgress()"
  />
  <step-cross-execution-status *stepGridItem="'crossExecutionStatus'" />
  <step-cross-execution-heatmap *stepGridItem="'heatMap'" [defaultDateRange]="luxonDateRange()" />
  <step-cross-execution-call-counts *stepGridItem="'callsCount'" />
  <step-alt-report-widget *stepGridItem="'errors'" class="full-height">
    <step-alt-report-widget-title>
      <step-grid-element-title />
    </step-alt-report-widget-title>
    <step-alt-report-widget-content class="widget-content">
      <step-alt-execution-errors
        [dataSource]="_state.errorsDataSource"
        [statusFilterItems]="availableErrorTypes()"
        [showActions]="false"
        [indicatorMode]="TableIndicatorMode.SKELETON"
      />
    </step-alt-report-widget-content>
  </step-alt-report-widget>
  <step-alt-report-widget *stepGridItem="'executions'" class="full-height">
    <step-alt-report-widget-title>
      <step-grid-element-title />
    </step-alt-report-widget-title>
    <step-alt-report-widget-content class="widget-content">
      @if (luxonDateRange(); as dateRange) {
        <step-cross-execution-executions-table
          [defaultDateRange]="dateRange!"
          [hiddenFilters]="_state.executionsTableFilters()"
        />
      }
    </step-alt-report-widget-content>
  </step-alt-report-widget>
</step-grid-layout>
