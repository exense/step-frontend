<section>
  <div class="header-row">
    <step-summary-card
        cardTitle="Success Rate"
        [value]="_state.successRateValue$ | async"
        [inProgress]="_state.successRateValueInProgress()"
    />
    <step-summary-card
        cardTitle="Average execution duration"
        [value]="_state.averageExecutionDurationLabel$ | async"
        [inProgress]="_state.averageDurationValueInProgress()"
    />
    <step-summary-card
        cardTitle="Total executions"
        [value]="_state.totalExecutionsCount$ | async"
        [inProgress]="_state.totalExecutionsValueInProgress()"
    />
  </div>
  <div class="row">
    <step-alt-report-node-summary
        class="piechart-container"
        title="Summary: Executions"
        [summary]="(_state.summaryData$ | async)"
        [disableChartItemClick]="true"
        [inProgress]="_state.summaryInProgress()"
    />
    <step-cross-execution-status class="flex-grow-1"/>
  </div>
  <div class="row">
     <step-cross-execution-heatmap [defaultDateRange]="luxonDateRange()" class="flex-grow-1"/>
  </div>
  <div class="row">
    <step-cross-execution-call-counts class="flex-grow-1"/>
  </div>
  <div class="row">
    <step-alt-report-widget class="flex-grow-1" title="Errors">
      <step-alt-report-widget-content class="widget-content">
        <step-alt-execution-errors
            [dataSource]="_state.errorsDataSource"
            [statusFilterItems]="availableErrorTypes()"
            [showActions]="false"
            [indicatorMode]="TableIndicatorMode.SKELETON"
        />
      </step-alt-report-widget-content>
    </step-alt-report-widget>
  </div>
  <div class="row">
    <step-alt-report-widget class="flex-grow-1" title="Executions">
      <step-alt-report-widget-content class="widget-content">
        @if (luxonDateRange(); as dateRange) {
          <step-cross-execution-executions-table
              [defaultDateRange]="dateRange!"
              [hiddenFilters]="_state.executionsTableFilters()"
          />
        }
      </step-alt-report-widget-content>
    </step-alt-report-widget>
  </div>
</section>
