<step-modal-window title="Open plan from repository" [hideButtonsSection]="true">
  <div step-modal-window-body>
    <p>This plan belongs to a <strong>{{ _data.repositoryId }}</strong> repository.</p>
    <p>Do you want to open the temporary copy in Step or the repository?</p>

    <div class="dialog-actions">
      <button type="button" mat-stroked-button [matDialogClose]="undefined">Cancel</button>
      <button type="button" mat-stroked-button (click)="openPlanInStep()">Open internal plan</button>
      <button type="button" mat-flat-button color="primary" (click)="openRepositoryPlan()">Open external repository</button>
    </div>
  </div>
</step-modal-window>
