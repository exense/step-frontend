<step-alt-report-widget [applyOverflow]="true">
  <step-alt-report-widget-title>
    <step-grid-element-title />
  </step-alt-report-widget-title>
  <step-alt-report-widget-filter>
    <step-alt-execution-tree-control-panel />
  </step-alt-report-widget-filter>
  <step-alt-report-widget-content>
    <step-alt-execution-tree
      #tree
      [details]="details()"
      stepAltExecutionTreeSearchFocus
      stepTreeAutoChooseVirtualScroll="100%"
      [applyVirtualScrollFrom]="100"
      [showSpinnerWhileTreeInitialize]="true"
      (openIterations)="handleOpenIterations($event)"
    />
  </step-alt-report-widget-content>
</step-alt-report-widget>
