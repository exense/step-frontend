<step-alt-report-node-list-widget
  sortByColumn="executionTime"
  [mode]="_mode"
  matSort
  matSortActive="executionTime"
  matSortDirection="desc"
  [matSortDisableClear]="true"
  stepElementSize
>
  <step-alt-report-widget-filter>
    <step-alt-execution-report-settings widgetType="keywordsList" />
  </step-alt-report-widget-filter>
  <step-alt-report-node-keywords (openDetails)="openDetails($event)" />
</step-alt-report-node-list-widget>
