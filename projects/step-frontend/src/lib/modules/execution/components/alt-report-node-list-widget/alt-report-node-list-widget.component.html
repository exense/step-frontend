<step-alt-report-widget [applyOverflow]="true">
  <step-alt-report-widget-title>
    <step-grid-element-title />
  </step-alt-report-widget-title>
  @if (_reportNodeListSort.showSort()) {
    <step-alt-report-widget-sort>
      <step-icon
        [name]="_reportNodeListSort.sort() === 'asc' ? 'arrow-up' : 'arrow-down'"
        (click)="_reportNodeListSort.toggleSort()"
      />
    </step-alt-report-widget-sort>
  }
  <step-alt-report-widget-filter>
    <ng-content select="step-alt-report-widget-filter" />
    @if (mode() === ViewMode.VIEW) {
      <step-alt-report-node-status-filter />
      <step-alt-report-node-search />
    } @else {
      <div>{{ statusText }}</div>
      <div>{{ searchText }}</div>
    }
  </step-alt-report-widget-filter>
  <step-alt-report-widget-content>
    <ng-content />
  </step-alt-report-widget-content>
</step-alt-report-widget>
