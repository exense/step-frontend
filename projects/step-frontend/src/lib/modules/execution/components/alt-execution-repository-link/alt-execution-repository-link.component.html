@if (planLink()) {
  <button type="button" class="plan-link" mat-icon-button matTooltip="Navigate to plan" matTooltipPosition="right" (click)="openPlan()">
    <step-icon name="external-link" />
  </button>
}
@if (automationPackageLinkParams(); as params) {
  <a
    class="plan-link"
    routerLink="/automation-package/list"
    [queryParams]="params"
    matTooltip="Navigate to automation package"
    matTooltipPosition="right"
  >
    <step-icon name="external-link" />
  </a>
}
