<step-stack-view (removeItem)="removeItem($event)">
  @for (item of stackItems(); track item.id) {
    @switch (item.type) {
      @case (StackItemType.ROOT) {
        <step-stack-view-item [itemId]="item.id" stepAltExecutionTreeWidget>
          <div *stepStackViewBreadcrumbsTitle class="breadcrumb-title">
            <step-icon name="tree" />
            <span>Keywords</span>
          </div>
          <section *stepStackViewItemTitle class="root-title">
            <div>Keywords</div>
          </section>
          <section *stepStackViewItemContent class="root-content">
            <step-alt-report-node-keywords />
            <!--
            <step-alt-execution-tree
                stepAltExecutionTreeSearchFocus
                stepTreeAutoChooseVirtualScroll="340px"
                [applyVirtualScrollFrom]="150"
                [showSpinnerWhileTreeInitialize]="true"
                [handleOpenIterationsManually]="true"
                (openIterations)="handleOpenIteration($event.node, item.id, $event.restParams)"
            />
-->
          </section>
          <div class="miniature" *stepStackViewItemMiniature matTooltip="Keywords" matTooltipPosition="below">
            <span>KW</span>
            <step-icon name="tree" />
          </div>
        </step-stack-view-item>
        <!--
        <step-stack-view-item [itemId]="item.id" stepAltExecutionTreeWidget>
          <div *stepStackViewBreadcrumbsTitle class="breadcrumb-title">
            <step-icon name="tree" />
            <span>Execution Tree</span>
          </div>
          <section *stepStackViewItemTitle class="root-title">
            <div>Execution Tree</div>
            <step-alt-execution-tree-control-panel />
          </section>
          <section *stepStackViewItemContent class="root-content">
            <step-alt-execution-tree
              stepAltExecutionTreeSearchFocus
              stepTreeAutoChooseVirtualScroll="340px"
              [applyVirtualScrollFrom]="150"
              [showSpinnerWhileTreeInitialize]="true"
              [handleOpenIterationsManually]="true"
              (openIterations)="handleOpenIteration($event.node, item.id, $event.restParams)"
            />
          </section>
          <div class="miniature" *stepStackViewItemMiniature matTooltip="Execution Tree" matTooltipPosition="below">
            <span>ET</span>
            <step-icon name="tree" />
          </div>
        </step-stack-view-item>
-->
      }
      @case (StackItemType.AGGREGATED_REPORT_NODE) {
        <step-stack-view-item [itemId]="item.id" itemTitle="Iteration List">
          <div *stepStackViewBreadcrumbsTitle class="breadcrumb-title">
            <step-icon name="list" />
            <span>Iteration List</span>
          </div>
          <section *stepStackViewItemContent>
            <step-aggregated-tree-node-iteration-list
              [node]="$any(item).data!"
              [resolvedPartialPath]="$any(item).resolvedPartialPath"
              [initialStatus]="$any(item).searchStatus"
              [initialStatusCount]="$any(item).searchStatusCount"
              (showDetails)="handleOpenDetails($event, item.id)"
            />
          </section>
          <div class="miniature" *stepStackViewItemMiniature matTooltip="Iteration List" matTooltipPosition="below">
            <span>E</span>
            <step-icon name="list" />
          </div>
        </step-stack-view-item>
      }
      @case (StackItemType.REPORT_NODE) {
        <step-stack-view-item [itemId]="item.id">
          <div *stepStackViewBreadcrumbsTitle class="breadcrumb-title">
            <step-icon name="sidebar" />
            <span>{{ $any(item).data.name }}</span>
          </div>
          <ng-container *stepStackViewItemTitle>
            <step-alt-report-node-header [node]="$any(item).data" />
          </ng-container>
          <ng-container *stepStackViewItemContent>
            <step-alt-report-node-details
              [node]="$any(item).data"
              [showArtefact]="false"
              (opernIterations)="handleOpenIteration($event.node, item.id, $event.restParams)"
            />
          </ng-container>
          <div
            class="miniature"
            *stepStackViewItemMiniature
            [matTooltip]="'Node Details: ' + $any(item).data.name"
            matTooltipPosition="below"
          >
            <span>ND</span>
            <step-icon name="sidebar" />
          </div>
        </step-stack-view-item>
      }
    }
  }
</step-stack-view>
<router-outlet />
