<step-auto-shrink-list
  [items]="parametersList()"
  [useShowAll]="true"
  allTitle="Execution parameters"
  allTooltip="Show all execution parameters"
  emptySearchPatterns="empty"
>
  <span class="empty" *stepAutoShrinkEmptyValueTemplate>&lt;empty&gt;</span>
  <ng-template stepAutoShrinkItemActionTemplate let-item>
    <button
      type="button"
      mat-icon-button
      class="copy-parameter-value"
      matTooltip="Copy the parameters value"
      (click)="copyParameterValue(item.value, $event)"
    >
      <step-icon name="copy" />
    </button>
  </ng-template>
</step-auto-shrink-list>
