<div class="container">
  <div class="status-tag" [style.--statusColor]="node().color">
    <div class="status-icon">
      <step-icon [name]="node().status | statusIcon" />
    </div>
    <span>{{ node().status }}</span>
  </div>
  <div class="link" (click)="navigateToExecution()" title="See Execution">
    <span>See execution</span>
  </div>
</div>
<div class="timestamp">
  {{ node().startTime | date: DateFormat.DATE }}
</div>
