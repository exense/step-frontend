<step-grid-layout-tabs>
  <ng-container *stepGridLayoutExternalTab="let tab">
    @if (tab.type === ExecutionViewTabType.PERFORMANCE) {
      <span class="tab-label">{{ tab.label }}</span>
    } @else if (tab.type === ExecutionViewTabType.DRILLDOWN) {
      <span class="tab-label">{{ tab.label }}</span>
      <span class="tab-action-slot tab-close-slot">
        <step-icon
          name="x"
          class="tab-action tab-action-visible"
          matTooltip="Close drilldown"
          matTooltipPosition="below"
          (click)="closeDrilldown(tab.drilldown, $event)"
        />
      </span>
    }
  </ng-container>
</step-grid-layout-tabs>
