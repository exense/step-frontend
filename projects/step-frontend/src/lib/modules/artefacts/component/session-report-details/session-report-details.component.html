@if (outputItems(); as outputs) {
  <section class="results-container">
    <step-report-details-sections [items]="outputs" />
    <button type="button" mat-icon-button matTooltip="Copy JSON to clipboard" (click)="copyItems()">
      <step-icon name="copy" />
    </button>
  </section>
}
@if (node()?.error) {
  <section class="data-container">
    <div class="container-title">Errors</div>
    <div>
      <step-report-details-error [node]="node()" />
    </div>
  </section>
}
@if (node()?.attachments; as attachments) {
  @if (attachments.length) {
    <section class="data-container">
      <div class="container-title">Attachments</div>
      <div>
        <step-report-details-attachments [attachments]="attachments" />
      </div>
    </section>
  }
}
