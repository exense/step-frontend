<section>
  <button type="button" mat-button mat-stroked-button>
    <step-icon name="folder"/>
    <span>Open package</span>
  </button>
  <button type="button" mat-button mat-stroked-button (click)="createPackage()">
    <step-icon name="plus"/>
    <span>New package</span>
  </button>
  <button type="button" mat-button mat-stroked-button>
    <step-icon name="x"/>
    <span>Close package</span>
  </button>
</section>
